<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>RevitClaw</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;600&display=swap"
    />
    <style>
      :root {
        --bg-primary: #f7f5ee;
        --bg-secondary: #eae5d9;
        --bg-white: #ffffff;
        --accent: #d97757;
        --accent-hover: #c4673e;
        --accent-light: rgba(217, 119, 87, 0.12);
        --text-primary: #2d2b28;
        --text-secondary: #6b6560;
        --text-muted: #9b9590;
        --border: #e0dcd4;
        --error: #c0392b;
        --error-bg: #fdf0ef;
        --success: #3d8c40;
        --shadow-sm: 0 1px 2px rgba(45, 43, 40, 0.06);
        --shadow-md: 0 2px 8px rgba(45, 43, 40, 0.1);
        --radius: 16px;
        --radius-sm: 10px;
        --font:
          "Inter", "Noto Sans SC", -apple-system, "PingFang SC",
          "Microsoft YaHei", sans-serif;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: var(--font);
        background: var(--bg-primary);
        color: var(--text-primary);
        height: 100vh;
        height: 100dvh;
        display: flex;
        flex-direction: column;
        -webkit-font-smoothing: antialiased;
      }

      /* ── Header ── */
      .header {
        background: var(--bg-white);
        color: var(--text-primary);
        padding: 14px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }

      .header-left {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .header-logo {
        width: 28px;
        height: 28px;
        background: var(--accent);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        color: #fff;
        font-weight: 600;
      }

      .header h1 {
        font-size: 17px;
        font-weight: 600;
        letter-spacing: -0.3px;
      }

      .header-right {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .status {
        font-size: 12px;
        font-weight: 500;
        padding: 4px 10px;
        border-radius: 20px;
        background: var(--error-bg);
        color: var(--error);
        transition: all 0.3s ease;
      }

      .status.connected {
        background: rgba(61, 140, 64, 0.1);
        color: var(--success);
      }

      .dark-toggle {
        background: none;
        border: 1px solid var(--border);
        border-radius: 8px;
        width: 32px;
        height: 32px;
        font-size: 15px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.2s;
      }

      .dark-toggle:active {
        background: var(--bg-secondary);
      }

      /* ── Quick commands ── */
      .quick-cmds {
        display: flex;
        gap: 8px;
        padding: 10px 20px;
        overflow-x: auto;
        background: var(--bg-white);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
        scrollbar-width: none;
      }

      .quick-cmds::-webkit-scrollbar {
        display: none;
      }

      .quick-cmds button {
        flex-shrink: 0;
        background: var(--accent-light);
        border: 1px solid transparent;
        border-radius: 20px;
        padding: 6px 14px;
        font-size: 13px;
        font-family: var(--font);
        font-weight: 500;
        color: var(--accent);
        cursor: pointer;
        transition: all 0.15s;
      }

      .quick-cmds button:active {
        background: var(--accent);
        color: #fff;
      }

      /* ── Messages ── */
      .messages {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 16px;
        scroll-behavior: smooth;
      }

      .msg-wrapper {
        display: flex;
        flex-direction: column;
        gap: 4px;
        animation: fadeIn 0.25s ease-out;
      }

      .msg-wrapper.user {
        align-items: flex-end;
      }

      .msg-wrapper.bot,
      .msg-wrapper.loading,
      .msg-wrapper.error {
        align-items: flex-start;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .msg {
        max-width: 82%;
        padding: 12px 16px;
        border-radius: var(--radius);
        font-size: 14.5px;
        line-height: 1.6;
        word-break: break-word;
        white-space: pre-wrap;
      }

      .msg-wrapper.user .msg {
        background: var(--accent);
        color: #fff;
        border-bottom-right-radius: 4px;
      }

      .msg-wrapper.bot .msg {
        background: var(--bg-white);
        color: var(--text-primary);
        border-bottom-left-radius: 4px;
        box-shadow: var(--shadow-sm);
        border: 1px solid var(--border);
      }

      .msg-wrapper.loading .msg {
        background: var(--bg-white);
        color: var(--text-muted);
        border-bottom-left-radius: 4px;
        box-shadow: var(--shadow-sm);
        border: 1px solid var(--border);
      }

      .msg-wrapper.error .msg {
        background: var(--error-bg);
        color: var(--error);
        border: 1px solid rgba(192, 57, 43, 0.15);
      }

      .msg .meta {
        font-size: 11px;
        color: var(--text-muted);
        margin-top: 6px;
        font-weight: 500;
        letter-spacing: 0.2px;
      }

      .msg-time {
        font-size: 11px;
        color: var(--text-muted);
        padding: 0 4px;
      }

      /* Loading dots */
      .msg.loading-msg .dots::after {
        content: "";
        animation: dots 1.2s steps(4, end) infinite;
      }

      @keyframes dots {
        0% {
          content: "";
        }
        25% {
          content: ".";
        }
        50% {
          content: "..";
        }
        75% {
          content: "...";
        }
      }

      /* Screenshot */
      .msg img.screenshot {
        max-width: 100%;
        border-radius: var(--radius-sm);
        margin-top: 10px;
        cursor: pointer;
        display: block;
        transition: opacity 0.2s;
      }

      .msg img.screenshot:active {
        opacity: 0.8;
      }

      /* Lightbox */
      .lightbox {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.88);
        z-index: 1000;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }

      .lightbox.active {
        display: flex;
      }

      .lightbox img {
        max-width: 95%;
        max-height: 90%;
        border-radius: var(--radius-sm);
      }

      /* ── Input area ── */
      .input-area {
        background: var(--bg-white);
        padding: 12px 16px;
        padding-bottom: max(12px, env(safe-area-inset-bottom));
        display: flex;
        align-items: center;
        gap: 8px;
        border-top: 1px solid var(--border);
        flex-shrink: 0;
      }

      .input-area input {
        flex: 1;
        border: 1.5px solid var(--border);
        border-radius: 22px;
        padding: 10px 16px;
        font-size: 15px;
        font-family: var(--font);
        outline: none;
        background: var(--bg-primary);
        color: var(--text-primary);
        transition: border-color 0.2s;
      }

      .input-area input::placeholder {
        color: var(--text-muted);
      }

      .input-area input:focus {
        border-color: var(--accent);
      }

      .send-btn {
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: 22px;
        padding: 10px 18px;
        font-size: 15px;
        font-family: var(--font);
        font-weight: 500;
        cursor: pointer;
        transition: background 0.15s;
        flex-shrink: 0;
      }

      .send-btn:active {
        background: var(--accent-hover);
      }

      .send-btn:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      /* Mic button */
      .mic-btn {
        background: var(--bg-primary);
        border: 1.5px solid var(--border);
        border-radius: 50%;
        width: 44px;
        height: 44px;
        font-size: 18px;
        cursor: pointer;
        flex-shrink: 0;
        display: none;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
        -webkit-user-select: none;
        user-select: none;
      }

      .mic-btn.supported {
        display: flex;
      }

      .mic-btn.recording {
        background: var(--error);
        border-color: var(--error);
        animation: pulse 1s ease-in-out infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.1);
        }
      }

      /* ── Footer ── */
      .footer {
        text-align: center;
        padding: 6px;
        font-size: 11px;
        color: var(--text-muted);
        background: var(--bg-white);
        border-top: 1px solid var(--border);
        flex-shrink: 0;
      }

      .footer a {
        color: var(--accent);
        text-decoration: none;
      }

      /* ── Dark mode ── */
      body.dark {
        --bg-primary: #1a1816;
        --bg-secondary: #252220;
        --bg-white: #2a2724;
        --accent: #e08b6d;
        --accent-hover: #d4714e;
        --accent-light: rgba(224, 139, 109, 0.15);
        --text-primary: #e8e4de;
        --text-secondary: #a09890;
        --text-muted: #706860;
        --border: #3a3632;
        --error: #e8625a;
        --error-bg: rgba(232, 98, 90, 0.12);
        --success: #5cb85c;
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.2);
        --shadow-md: 0 2px 8px rgba(0, 0, 0, 0.3);
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="header-left">
        <div class="header-logo">RC</div>
        <h1>RevitClaw</h1>
      </div>
      <div class="header-right">
        <span class="status" id="status">未连接</span>
        <button class="dark-toggle" id="darkToggle" title="切换深色模式">
          🌙
        </button>
      </div>
    </div>

    <div class="quick-cmds">
      <button onclick="quickSend('在1-A位置创建一根柱子')">创建柱</button>
      <button onclick="quickSend('在1楼A-B轴之间创建一根梁')">创建梁</button>
      <button onclick="quickSend('生成3x2跨5层框架')">生成框架</button>
      <button onclick="quickSend('查询模型概况')">模型概况</button>
      <button onclick="quickSend('/help')">帮助</button>
    </div>

    <div class="messages" id="messages"></div>

    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
      <img id="lightboxImg" src="" alt="截图预览" />
    </div>

    <div class="input-area">
      <button class="mic-btn" id="micBtn">🎤</button>
      <input
        type="text"
        id="input"
        placeholder="输入建模指令..."
        autocomplete="off"
      />
      <button class="send-btn" id="sendBtn" onclick="send()">发送</button>
    </div>

    <div class="footer">
      Built with
      <a href="https://claude.ai/code" target="_blank">Claude Code</a>
    </div>

    <script>
      const API_BASE = location.origin;
      const messagesEl = document.getElementById("messages");
      const inputEl = document.getElementById("input");
      const sendBtn = document.getElementById("sendBtn");
      const statusEl = document.getElementById("status");
      const darkToggle = document.getElementById("darkToggle");

      // Enter to send
      inputEl.addEventListener("keydown", function (e) {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          send();
        }
      });

      // ── Dark mode ──
      function initDarkMode() {
        const saved = localStorage.getItem("revitclaw-dark");
        if (saved === "true") {
          document.body.classList.add("dark");
          darkToggle.textContent = "☀️";
        }
      }

      darkToggle.addEventListener("click", function () {
        const isDark = document.body.classList.toggle("dark");
        darkToggle.textContent = isDark ? "☀️" : "🌙";
        localStorage.setItem("revitclaw-dark", isDark);
      });

      initDarkMode();

      // ── Lightbox ──
      const lightboxEl = document.getElementById("lightbox");
      const lightboxImg = document.getElementById("lightboxImg");

      function openLightbox(src) {
        lightboxImg.src = src;
        lightboxEl.classList.add("active");
      }

      function closeLightbox() {
        lightboxEl.classList.remove("active");
        lightboxImg.src = "";
      }

      // ── Messages ──
      function getTimeStr() {
        const now = new Date();
        return (
          String(now.getHours()).padStart(2, "0") +
          ":" +
          String(now.getMinutes()).padStart(2, "0")
        );
      }

      function addMessage(text, type, meta, screenshotUrl) {
        const wrapper = document.createElement("div");
        wrapper.className = "msg-wrapper " + type;

        const div = document.createElement("div");
        div.className = "msg";
        div.textContent = text;

        if (screenshotUrl) {
          const img = document.createElement("img");
          img.className = "screenshot";
          img.src = screenshotUrl;
          img.alt = "Revit 截图";
          img.onclick = function (e) {
            e.stopPropagation();
            openLightbox(screenshotUrl);
          };
          div.appendChild(img);
        }

        if (meta) {
          const metaEl = document.createElement("div");
          metaEl.className = "meta";
          metaEl.textContent = meta;
          div.appendChild(metaEl);
        }

        wrapper.appendChild(div);

        const timeEl = document.createElement("div");
        timeEl.className = "msg-time";
        timeEl.textContent = getTimeStr();
        wrapper.appendChild(timeEl);

        messagesEl.appendChild(wrapper);
        messagesEl.scrollTop = messagesEl.scrollHeight;
        return wrapper;
      }

      function quickSend(text) {
        inputEl.value = text;
        send();
      }

      async function send() {
        const text = inputEl.value.trim();
        if (!text) return;

        addMessage(text, "user");
        inputEl.value = "";
        sendBtn.disabled = true;

        // Loading bubble
        const loadingWrapper = document.createElement("div");
        loadingWrapper.className = "msg-wrapper loading";
        const loadingDiv = document.createElement("div");
        loadingDiv.className = "msg loading-msg";
        loadingDiv.innerHTML = '执行中<span class="dots"></span>';
        loadingWrapper.appendChild(loadingDiv);
        messagesEl.appendChild(loadingWrapper);
        messagesEl.scrollTop = messagesEl.scrollHeight;

        try {
          const resp = await fetch(API_BASE + "/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: text }),
          });

          const data = await resp.json();
          loadingWrapper.remove();

          if (data.success) {
            addMessage(
              data.reply,
              "bot",
              data.action || "",
              data.screenshot_url || null,
            );
          } else {
            addMessage(data.error || "请求失败", "error");
          }
        } catch (err) {
          loadingWrapper.remove();
          addMessage("无法连接服务器: " + err.message, "error");
        } finally {
          sendBtn.disabled = false;
          inputEl.focus();
        }
      }

      // ── Health check ──
      async function checkConnection() {
        try {
          const resp = await fetch(API_BASE + "/api/health", {
            signal: AbortSignal.timeout(3000),
          });
          const data = await resp.json();
          statusEl.textContent = data.revit ? "已连接(Revit)" : "已连接(离线)";
          statusEl.classList.add("connected");
        } catch {
          statusEl.textContent = "未连接";
          statusEl.classList.remove("connected");
        }
      }

      checkConnection();
      setInterval(checkConnection, 5000);

      addMessage(
        "RevitClaw 已启动\n用中文输入建模指令，AI 自动解析并控制 Revit。\n\n试试说：\n  在1-A位置创建一根500x500的柱子\n  查询模型有多少构件\n  生成3x2跨5层框架",
        "bot",
      );

      // ── Voice input (press-and-hold) ──
      const SpeechRecognition =
        window.SpeechRecognition || window.webkitSpeechRecognition;
      const micBtn = document.getElementById("micBtn");

      if (SpeechRecognition) {
        micBtn.classList.add("supported");

        const recognition = new SpeechRecognition();
        recognition.lang = "zh-CN";
        recognition.interimResults = true;
        recognition.continuous = true;

        let finalTranscript = "";
        let isRecording = false;

        recognition.onresult = function (e) {
          let interim = "";
          finalTranscript = "";
          for (let i = 0; i < e.results.length; i++) {
            if (e.results[i].isFinal) {
              finalTranscript += e.results[i][0].transcript;
            } else {
              interim += e.results[i][0].transcript;
            }
          }
          inputEl.value = finalTranscript + interim;
        };

        recognition.onerror = function (e) {
          if (e.error !== "aborted") {
            addMessage("语音识别失败: " + e.error, "error");
          }
          stopRecording();
        };

        recognition.onend = function () {
          if (isRecording) stopRecording();
        };

        function startRecording() {
          finalTranscript = "";
          inputEl.value = "";
          inputEl.placeholder = "正在听...";
          isRecording = true;
          micBtn.classList.add("recording");
          try {
            recognition.start();
          } catch (e) {}
        }

        function stopRecording() {
          isRecording = false;
          micBtn.classList.remove("recording");
          inputEl.placeholder = "输入建模指令...";
          try {
            recognition.stop();
          } catch (e) {}
          const text = inputEl.value.trim();
          if (text) send();
        }

        micBtn.addEventListener("mousedown", function (e) {
          e.preventDefault();
          startRecording();
        });
        micBtn.addEventListener("mouseup", function (e) {
          e.preventDefault();
          stopRecording();
        });
        micBtn.addEventListener("mouseleave", function () {
          if (isRecording) stopRecording();
        });

        micBtn.addEventListener("touchstart", function (e) {
          e.preventDefault();
          startRecording();
        });
        micBtn.addEventListener("touchend", function (e) {
          e.preventDefault();
          stopRecording();
        });
        micBtn.addEventListener("touchcancel", function () {
          if (isRecording) stopRecording();
        });
      }
    </script>
  </body>
</html>
